  <line x1="14" y1="61" x2="42" y2="61" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
  <line x1="16" y1="67" x2="42" y2="64" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
  <!-- Whiskers right -->
  <line x1="84" y1="55" x2="58" y2="58" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
  <line x1="86" y1="61" x2="58" y2="61" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
  <line x1="84" y1="67" x2="58" y2="64" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
  <!-- Paws -->
