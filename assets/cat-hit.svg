<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 136">
  <!-- Stars around head -->
  <polygon points="14,18 16.5,10 19,18 12,13 21,13" fill="#FFD700" stroke="#FFA500" stroke-width="0.8"/>
  <polygon points="58,5 61,0 64,5 57,2 66,2"  fill="#FFD700" stroke="#FFA500" stroke-width="0.8"/>
  <polygon points="100,18 102.5,10 105,18 98,13 107,13" fill="#FFD700" stroke="#FFA500" stroke-width="0.8"/>
  <!-- Whole cat, slightly tilted -->
  <g transform="rotate(-10, 55, 80)">
    <!-- Tail -->
    <path d="M82 104 Q102 84 94 66" stroke="#F5A623" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="55" cy="100" rx="26" ry="24" fill="#F5A623"/>
    <!-- Belly -->
    <ellipse cx="55" cy="104" rx="16" ry="16" fill="#FDEAC4"/>
    <!-- Head -->
    <circle cx="55" cy="58" r="26" fill="#F5A623"/>
    <!-- Bump on head from snowball -->
    <ellipse cx="55" cy="34" rx="9" ry="6" fill="#E8820A"/>
    <!-- Left ear outer -->
    <polygon points="31,46 23,22 47,36" fill="#F5A623"/>
    <!-- Left ear inner -->
    <polygon points="32,44 27,26 45,36" fill="#FFB6C1"/>
    <!-- Right ear outer -->
    <polygon points="79,46 87,22 63,36" fill="#F5A623"/>
    <!-- Right ear inner -->
    <polygon points="78,44 83,26 65,36" fill="#FFB6C1"/>
    <!-- X left eye -->
    <line x1="38" y1="50" x2="47" y2="59" stroke="#2C3E50" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="47" y1="50" x2="38" y2="59" stroke="#2C3E50" stroke-width="3.2" stroke-linecap="round"/>
    <!-- X right eye -->
    <line x1="63" y1="50" x2="72" y2="59" stroke="#2C3E50" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="72" y1="50" x2="63" y2="59" stroke="#2C3E50" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Nose -->
    <polygon points="55,65 51,69 59,69" fill="#E74C3C"/>
    <!-- Surprised open mouth -->
    <ellipse cx="55" cy="75" rx="6" ry="5" fill="#C0392B"/>
    <!-- Whiskers left -->
    <line x1="21" y1="63" x2="47" y2="66" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
    <line x1="19" y1="69" x2="47" y2="69" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
    <!-- Whiskers right -->
    <line x1="89" y1="63" x2="63" y2="66" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
    <line x1="91" y1="69" x2="63" y2="69" stroke="#7F8C8D" stroke-width="1.3" opacity="0.7"/>
    <!-- Paws -->
    <ellipse cx="41" cy="122" rx="11" ry="7" fill="#F5A623"/>
    <ellipse cx="69" cy="122" rx="11" ry="7" fill="#F5A623"/>
  </g>
</svg>
