<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160">
  <!-- Bottom ball -->
  <circle cx="50" cy="126" r="32" fill="#EEF7FF" stroke="#B3D9F7" stroke-width="2"/>
  <!-- Top ball / head -->
  <circle cx="50" cy="72" r="24" fill="#EEF7FF" stroke="#B3D9F7" stroke-width="2"/>
  <!-- Hat brim -->
  <rect x="28" y="50" width="44" height="6" rx="3" fill="#2C3E50"/>
  <!-- Hat body -->
  <rect x="35" y="24" width="30" height="28" rx="3" fill="#2C3E50"/>
  <!-- Hat band -->
  <rect x="35" y="45" width="30" height="6" fill="#E74C3C"/>
  <!-- Eyes -->
  <circle cx="42" cy="66" r="3.5" fill="#2C3E50"/>
  <circle cx="58" cy="66" r="3.5" fill="#2C3E50"/>
  <circle cx="43" cy="64.5" r="1.3" fill="white"/>
  <circle cx="59" cy="64.5" r="1.3" fill="white"/>
  <!-- Carrot nose -->
  <polygon points="50,72 63,70 50,76" fill="#E67E22"/>
  <!-- Smile -->
  <path d="M41 80 Q50 87 59 80" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Scarf -->
  <path d="M31 89 Q50 98 69 89" stroke="#E74C3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M31 93 Q38 102 34 110" stroke="#E74C3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Buttons -->
  <circle cx="50" cy="108" r="3.2" fill="#2C3E50"/>
  <circle cx="50" cy="122" r="3.2" fill="#2C3E50"/>
  <circle cx="50" cy="136" r="3.2" fill="#2C3E50"/>
  <!-- Arms -->
  <line x1="17" y1="118" x2="36" y2="104" stroke="#9B7B3D" stroke-width="4" stroke-linecap="round"/>
  <line x1="83" y1="118" x2="64" y2="104" stroke="#9B7B3D" stroke-width="4" stroke-linecap="round"/>
  <!-- Snow mound -->
  <ellipse cx="50" cy="158" rx="44" ry="7" fill="#C8E6FA" opacity="0.55"/>
</svg>
