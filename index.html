<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kids Chinese Character Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app" role="application" aria-label="Chinese character learning game">

      <!-- View 1: Start Screen -->
      <div id="viewStart">
        <section class="startScreen" aria-label="Start screen">
          <h1 class="startTitle">Chinese Sparkle!</h1>
          <p class="startDesc">Learn Chinese characters by choosing the correct meaning.</p>
          <button id="startBtn" class="actionBtn actionStart" type="button">Start</button>
        </section>
      </div>

      <!-- View 2: Game Screen -->
      <div id="viewGame" style="display:none">

        <!-- Top bar: title left · level + stars + home right -->
        <header class="topbar">
          <div class="titleBlock">
            <h1 class="title">Chinese Sparkle!</h1>
          </div>
          <div class="topbarRight">
            <div class="levelWrap" aria-label="Current level">
              <span class="levelIcon" aria-hidden="true">🏅</span>
              <span class="levelLabel">Level</span>
              <span id="levelCount" class="levelCount">1</span>
            </div>
            <div class="starsWrap" aria-label="Stars earned">
              <span class="starIcon" aria-hidden="true">⭐</span>
              <span id="starsCount" class="starsCount">0</span>
            </div>
            <button id="homeBtn" class="actionBtn actionHome" type="button">🏠 Home</button>
          </div>
        </header>

        <!-- Main game area -->
        <section id="gameCard" class="gameArea" aria-label="Question card">

          <!-- Large character card -->
          <div class="charCard">
            <div class="charCardLabel">Character</div>
            <div id="characterHanzi" class="hanzi" aria-live="polite">山</div>
          </div>

          <!-- Pinyin + Hint side by side -->
          <div class="infoRow">
            <div class="infoCard infoCardBlue">
              <div class="infoCardLabel">Pinyin</div>
              <div id="pinyinText" class="infoCardValue" aria-live="polite">shān</div>
            </div>
            <div class="infoCard infoCardPurple">
              <div class="infoCardLabel">Hint</div>
              <div id="emojiHint" class="infoCardEmoji" aria-live="polite">⛰️</div>
            </div>
          </div>

          <!-- Progress -->
          <p id="progressText" class="progressText" aria-live="polite">Card 1 of 15</p>

          <!-- Answer buttons -->
          <div id="buttonsGrid" class="buttonsGrid" role="group" aria-label="Answer choices">
            <!-- Injected by script.js -->
          </div>

          <!-- Feedback -->
          <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="answerRevealed" class="answerRevealed" aria-live="polite"></div>

          <!-- Speak + Next -->
          <div class="actionRow" role="group" aria-label="Game actions">
            <button id="speakBtn" class="actionBtn actionSpeak" type="button">🔊 Speak</button>
            <button id="nextBtn" class="actionBtn actionNext" type="button" disabled>Next →</button>
          </div>
          <p class="nextHelp" id="nextHelp" aria-live="polite">
            Answer correctly to unlock Next.
          </p>

        </section>

        <footer class="footerHelp">
          <span class="footerDot" aria-hidden="true"></span>
          <span>For ages <strong>4–7</strong>: big buttons, lots of stars, and gentle feedback.</span>
        </footer>

      </div>

    </main>
    <script src="./script.js"></script>
  </body>
</html>
